<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ж №пј•жҢҮд»Өдёӯеҝғ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Noto Sans SC',sans-serif;background:#F0F7EE;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:20px;padding:40px;width:100%;max-width:560px;box-shadow:0 4px 24px rgba(45,90,39,.12);border-top:4px solid #2D5A27}
h1{font-size:1.6rem;color:#1A3818;margin-bottom:8px}
p{color:#3D5C3A;font-size:.9rem;margin-bottom:24px}
label{display:block;font-size:.85rem;color:#3D5C3A;margin-bottom:6px;font-weight:500}
select{width:100%;padding:12px 16px;border:1.5px solid #C2E6BB;border-radius:10px;font-size:1rem;color:#1A3818;background:#F0F7EE;margin-bottom:16px;outline:none}
textarea{width:100%;padding:16px;border:1.5px solid #C2E6BB;border-radius:10px;font-size:1rem;color:#1A3818;background:#FAFDF8;resize:vertical;min-height:120px;outline:none;font-family:inherit;line-height:1.6;margin-bottom:16px}
.cnt{display:flex;gap:12px;margin-bottom:16px}
input[type=number]{flex:1;padding:12px 16px;border:1.5px solid #C2E6BB;border-radius:10px;font-size:1rem;color:#1A3818;background:#F0F7EE;outline:none}
button{width:100%;padding:16px;background:#2D5A27;color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s;box-shadow:0 3px 12px rgba(45,90,39,.3)}
button:hover{background:#1A3818}
button:disabled{background:#A8D9A0;cursor:not-allowed}
.status{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:.9rem;display:none;text-align:center}
.success{background:#EAF3DE;color:#2D5A27;display:block}
.error{background:#FCEBEB;color:#A32D2D;display:block}
</style>
</head>
<body>
  <div class="card">
    <h1>жҠҘпј•пј—дёӯж–ҮжҺҲдҪғиҖ…</h1>
    <p>з”өдёҖйғҪйЈ‘пјҢзі»еёҲиҮӘе…ғжү§иЎҢ</p>
    <label>д»»еҠЎ:зұ»еһӢе®Ӣ</label>
    <select id="type">
      <option value="зҪ‘з:¬">зІ‘з:¬</option>
      <option value="е°Ҹеҫ—">е°Ҹеҫ—</option>
      <option value="и§ҶиЎЁ">и§ҶиЎЁ</option>
      <option value="ж·»еҗҲе°Ҹеҫ—и§ҶиЎЁ">е·»еҗҲе°Ҹеҫ—§§ҶиЁҚ</option>
    </select>
    <label>еұҖ</label>
    <select id="style">
      <option value="жҹҘжң§зөҗж№ҫ">жҹҘеңҹзөҗж№ҫ</option>
      <option value="жӯўгҖ’ж„Ҹиҙң">еӯўгҖ’ж„Ҹиҙҹ</option>
      <option value="жұёд№ҹдёЁеӯҗ">жұёд№ҹдёЁеӯҗ</option>
      <option value="зӢ‘и®ёз¶ҡзәҰ">зӢ‘и®ёз¶ҡзәҰ</option>
    </select>
    <label>ж•°</label>
    <div class="cnt">
      <input type="number" id="count" value="1" min="1" max="3">
      <select id="unit">
        <option value="зІ‘">зІ‘иҜҫеәҰ</option>
        <option value="жқҘ">жқҘиҜҫеәҰ</option>
        <option value="дёӘиЎЁ">дёӘиЎЁ'”ЁйЎҝдҪҝз”Ё</option>
      </select>
    </div>
    <label>ж—ҘдҪҷйҖ»жӮ©/жөҸжқЎдәҺе®№зҹҘпјҲдёӯж–ҮжҸ’йҮҚпјү</label>
    <textarea id="req" placeholder="д№ еҰӮпјҡдёәжүҖфҸҡhеЁҳе°Ҹдёҡд№ҹйғҪеҗ§гҖҒжңҖйғҪеҠӣжөӢиҜ„"></textarea>
    <button onclick="send()" id="btn">еҸ‘й’ҘжҺЁд»· 2</start></button>
    <div class="status" id="st"></div>
  </div>
<script>
const URL["]https://hook.us2.make.com/5qi1044vykcxqc7pqyib0sbsbqy9s6qq";
function send(){
  const t=document.getElementById('type').value;
  const s=document.getElementById('style').value;
  const c=document.getElementById('count').value;
  const u=document.getElementById('unit').value;
  const r=document.getElementById('req').value.trim();
  const b=document.getElementById('btn');
  const st=document.getElementById('st');
  if(!r){st.className='status error';st.textContent='иҜ·ж0“еҚ•гҖҗеҢ–дҪ“зҡ„еҸӘи°қгҖ‘';return}
  const req=`д»»еҠЎ: ${t}\nеӨҠ: ${s}\nйҖұ: ${c}${u}\nеҸӘи°һ: ${r}`;
  b.disabled=true;b.textContent='еҸ‘й’ҘдёӯвҖҰ';
  st.className='status success';st.textContent='еҸ‘й’ҘдёӯгҖўуүҠдә’з§Ғж— иЎҢдә’д»Јз ҒеҗҚпјҒ';
  fetch(URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requirement:req}),mode:'no-cors'})
  .then(()=>{st.textContent='вң… иЎІд»· || е·ІйҖҖеҮәдёҠпјҢVercelдјҡиҮӘеҠЁйҖӮдҪ•гҖӮ';})
  .catch(()=>{st.className='status error';st.textContent='вҠҶ еҸ‘й’ҘеӨұиҙҘпјҢиҜ·жЈҖжүҖзҪ‘йЎө';})
  .finally(()=>{b.disabled=false;b.textContent='еҸ‘й’ҘжҺЁд»· рҹҳІ';})
}
</script>
</body>
</html>
